<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nederlands — Flashcards Quiz</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#222222">
  <style>
    body{font-family:Arial,sans-serif;margin:0;background:#f9f9f9;color:#222;display:flex;justify-content:center;align-items:center;min-height:100vh}.app{max-width:600px;width:100%;border-radius:8px;padding:20px;text-align:center}.prompt{font-size:28px;margin:20px 0}.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}.option{padding:14px;border:1px solid #ccc;border-radius:6px;background:#f2f2f2;cursor:pointer;font-size:16px;transition:background .2s}.option.correct{background:#c8f7c5;border-color:#3cba54}.option.wrong{background:#f7c5c5;border-color:#ba3c3c}.stats{margin-top:10px;font-size:14px;color:#666}.hint{margin-top:15px;font-size:14px;color:#555;display:none}button{margin-top:10px;padding:6px 12px;font-size:14px;cursor:pointer}
  </style>
</head>
<body>
  <div class="app">
    <div class="prompt" id="prompt">Нажмите "Начать"</div>
    <div class="options" id="options"></div>
    <button id="modeToggle">Режим: NL → RU</button>
    <button id="startBtn">Начать</button>
    <div class="stats">Правильно: <span id="correctCount">0</span> · Ошибок: <span id="wrongCount">0</span> · Осталось: <span id="remaining">0</span></div>
    <button id="hintBtn" style="display:none">Показать подсказку</button>
    <div class="hint" id="hintBox"></div>
  </div>

  <script>
    const WORDS = [
      {nl:'de condoleancekaart',ru:'открытка с соболезнованиями',example:{nl:'Ik stuur een condoleancekaart naar mijn collega.'}},
      {nl:'de felicitaties',ru:'поздравления',example:{nl:'Hij krijgt veel felicitaties.'}},
      {nl:'feliciteren met',ru:'поздравлять с',example:{nl:'Ik feliciteer jou met je nieuwe baan.'}},
      {nl:'gefeliciteerd met',ru:'поздравляю с',example:{nl:'Gefeliciteerd met je verjaardag!'}},
      {nl:'geen dank',ru:'не за что',example:{nl:'Dank je wel! Geen dank.'}},
      {nl:'graag gedaan',ru:'пожалуйста / не за что',example:{nl:'Dank je wel! Graag gedaan.'}},
      {nl:'nog vele jaren',ru:'долгих лет',example:{nl:'Gefeliciteerd, nog vele jaren!'}},
      {nl:'het zit erop',ru:'всё закончено / всё позади',example:{nl:'Het examen zit erop.'}},
      {nl:'opruimen',ru:'убирать / приводить в порядок',example:{nl:'Ik ruim mijn kamer op.'}},
      {nl:'op vakantie gaan',ru:'ехать в отпуск',example:{nl:'Wij gaan in de zomer op vakantie.'}},
      {nl:'meedoen',ru:'участвовать',example:{nl:'Ik wil meedoen.'}},
      {nl:'nadoen',ru:'копировать / передразнивать',example:{nl:'Hij doet de leraar na.'}},
      {nl:'iemand op de schouders dragen',ru:'нести кого-то на плечах',example:{nl:'De vader draagt zijn kind op de schouders.'}},
      {nl:'iemand een schouderklopje geven',ru:'похлопать по плечу / похвалить',example:{nl:'De baas gaf mij een schouderklopje.'}},
      {nl:'het gedrag',ru:'поведение',example:{nl:'Zijn gedrag is niet goed.'}},
      {nl:'de mening',ru:'мнение',example:{nl:'Dat is mijn mening.'}},
      {nl:'de ruzie',ru:'ссора / конфликт',example:{nl:'Ik wil geen ruzie.'}},
      {nl:'de zorg',ru:'забота / уход / здравоохранение',example:{nl:'Ik zorg voor mijn kat.'}},
      {nl:'de afspraak',ru:'встреча / договорённость / запись',example:{nl:'Ik heb een afspraak met de dokter.'}},
      {nl:'de beurt',ru:'очередь / ход',example:{nl:'Jij bent aan de beurt.'}},
      {nl:'de omgeving',ru:'окружение / окрестности',example:{nl:'De omgeving is mooi.'}},
      {nl:'de kans',ru:'шанс / вероятность / возможность',example:{nl:'Ik heb een kans.'}},
      {nl:'de bedoeling',ru:'намерение / замысел / смысл',example:{nl:'Wat is de bedoeling?'}},
      {nl:'het verschil',ru:'разница / отличие',example:{nl:'Het verschil is niet groot.'}},
      {nl:'de keuze',ru:'выбор',example:{nl:'Dat is mijn keuze.'}},
      {nl:'de gewoonte',ru:'привычка / обычай',example:{nl:'Roken is geen goede gewoonte.'}},
      {nl:'de ervaring',ru:'опыт',example:{nl:'Ik heb ervaring met computers.'}},
      {nl:'het voordeel',ru:'преимущество / польза / выгода',example:{nl:'Dat is een voordeel.'}},
      {nl:'het ongeluk',ru:'авария / несчастный случай',example:{nl:'Hij had een ongeluk.'}},
      {nl:'kiezen',ru:'выбирать',example:{nl:'Ik kies deze optie.'}},
      {nl:'bedoelen',ru:'иметь в виду / подразумевать',example:{nl:'Wat bedoel je?'}},
      {nl:'ervaren',ru:'испытывать / узнавать на опыте',example:{nl:'Ik heb dat zelf ervaren.'}},
      {nl:'menen',ru:'считать / полагать',example:{nl:'Ik meen dat het goed is.'}},
      {nl:'zorgen voor',ru:'заботиться о',example:{nl:'Ik zorg voor mijn kat.'}}
    ];

    let pool=[], current=null, correct=0, wrong=0, reverseMode=false;
    const promptEl=document.getElementById('prompt'), optionsEl=document.getElementById('options'), correctCountEl=document.getElementById('correctCount'), wrongCountEl=document.getElementById('wrongCount'), remainingEl=document.getElementById('remaining'), startBtn=document.getElementById('startBtn'), hintBox=document.getElementById('hintBox'), hintBtn=document.getElementById('hintBtn'), modeToggle=document.getElementById('modeToggle');
    const synth=window.speechSynthesis;
    startBtn.addEventListener('click', startSession);
    hintBtn.addEventListener('click',()=>{hintBox.style.display='block';hintBtn.style.display='none';});
    modeToggle.addEventListener('click',()=>{reverseMode=!reverseMode;modeToggle.textContent=reverseMode?'Режим: RU → NL':'Режим: NL → RU';});
    function startSession(){pool=shuffle([...WORDS]);correct=0;wrong=0;updateStats();startBtn.style.display='none';loadNext();}
    function loadNext(){hintBox.style.display='none';hintBtn.style.display='inline-block';if(pool.length===0){promptEl.textContent='Сессия завершена!';optionsEl.innerHTML='';startBtn.textContent='Начать заново';startBtn.style.display='inline-block';hintBtn.style.display='none';return;}current=pool.shift();promptEl.textContent=reverseMode?current.ru:current.nl;if(!reverseMode){const utterance=new SpeechSynthesisUtterance(current.nl);utterance.lang='nl-NL';const voices=synth.getVoices();const dutchVoice=voices.find(v=>v.lang==='nl-NL');if(dutchVoice) utterance.voice=dutchVoice;synth.speak(utterance);}hintBox.textContent=current.example.nl;const correctAnswer=reverseMode?current.nl:current.ru;const choices=new Set([correctAnswer]);while(choices.size<4){const pick=WORDS[Math.floor(Math.random()*WORDS.length)];choices.add(reverseMode?pick.nl:pick.ru);}optionsEl.innerHTML='';shuffle(Array.from(choices)).forEach(opt=>{const b=document.createElement('button');b.className='option';b.textContent=opt;b.addEventListener('click',()=>handleAnswer(b,opt===correctAnswer,correctAnswer));optionsEl.appendChild(b);});}
    function handleAnswer(button,isCorrect,correctAnswer){document.querySelectorAll('.option').forEach(btn=>{btn.disabled=true;if(btn.textContent===correctAnswer) btn.classList.add('correct');else if(btn===button&&!isCorrect) btn.classList.add('wrong');});if(isCorrect) correct++; else wrong++; updateStats(); setTimeout(loadNext,1200);}
    function updateStats(){correctCountEl.textContent=correct;wrongCountEl.textContent=wrong;remainingEl.textContent=pool.length;}
    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  </script>
  <script>if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js').then(()=>console.log('Service Worker registered')).catch(console.error);}</script>
</body>
</html>
